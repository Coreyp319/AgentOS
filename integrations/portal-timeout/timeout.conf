# AgentOS — give xdg-desktop-portal a sane cold-boot start timeout.
#
# Root cause (live boot journals, 2026-06-23): CachyOS ships a global
# DefaultTimeoutStartSec=15s (/usr/lib/systemd/user.conf.d/00-timeout.conf, a
# fast-boot tweak). xdg-desktop-portal is Type=dbus — its start "completes" only
# when it acquires org.freedesktop.portal.Desktop, and that needs its KDE backend
# (plasma-xdg-desktop-portal-kde, After=plasma-core.target) to be up. When the
# portal is D-Bus-activated EARLY at cold boot (before plasma-core.target is
# ready), it can't finish init inside 15s, so systemd kills it
# ("start operation timed out. Terminating.") and it stays Failed until something
# re-activates it minutes later. A dead portal breaks screencast, plasmashell's
# portal registration, and stalls every GTK/Qt client that queries Settings at
# boot (~25s D-Bus timeouts) — the cascade that broke notifications.
#
# Fix: restore the upstream-stock 90s start timeout for THIS service only (do NOT
# touch the global setting — every other unit keeps CachyOS's fast 15s). An
# early-activated portal now waits out the session-ready boundary instead of being
# aborted; once Plasma core is up it acquires the name in <1s. No After=/Wants=
# edges are added on purpose — ordering edges around the portal previously formed a
# plasmashell ordering cycle.
#
# Reversible: rm this file + `systemctl --user daemon-reload`.
[Service]
TimeoutStartSec=90
