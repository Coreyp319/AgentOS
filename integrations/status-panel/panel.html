<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<title>AgentOS · system status</title>
<style>
  :root {
    /* ── Instrument palette — the deep-navy "glass" register shared with the keyhole tray
       (ADR-0012). Canonical values + the cross-surface contract: integrations/design/
       instrument-tokens.md. Aligned to keyhole's StateToken/FullRepresentation values so a
       re-theme is one change across both surfaces. ── */
    --inst-base:    #12141c;            /* keyhole panel base */
    --inst-deep:    #161a28;
    --inst-horizon: #1a2238;            /* keyhole horizon */
    --inst-text:    #e6e9f0;            /* keyhole fg */
    --inst-muted:   #8a90a0;            /* keyhole dimFg */
    --inst-label:   #878c9b;            /* keyhole labelFg — 4.5:1 on glass (was #7a8090/3.86:1; ADR-0031) */
    --inst-blue:    #7aa2ff;            /* cool accent / links */
    --inst-warm:    #ff9957;            /* keyhole warmFg — RESERVED for a future "needs you" cue; not spent on chrome */
    --brand-warm:   #e0884f;            /* lower-sat copper for brand decoration, so the dawn-glow hue stays reserved */
    --glass:        rgba(38,42,54,0.46);
    --hairline:     rgba(255,255,255,0.07);
    --hairline-hi:  rgba(255,255,255,0.12);
    --tint-hover:   rgba(255,255,255,0.025);

    /* role aliases consumed through the sheet */
    --bg-0: var(--inst-base); --bg-1: var(--inst-deep); --bg-2: var(--inst-horizon);
    --text: var(--inst-text); --muted: var(--inst-muted); --faint: var(--inst-label);
    --blue: var(--inst-blue);
    --card: var(--glass); --card-line: var(--hairline); --card-line-hi: var(--hairline-hi);

    /* ── Status ramp — 5 live hues + 1 reserved. fg (text-on-glass), ring (halo) and line
       (border) are DERIVED via color-mix, so re-hueing a base carries its whole family. ── */
    --st-up:      #74d39a;
    --st-amber:   #f2c879;
    --st-red:     #ec7676;
    --st-idle:    #757c8e;              /* lifted so the down/absent dot clears 3:1 non-text contrast */
    --st-unknown: #6f7894;              /* cooler grey: "can't determine", distinct from idle "down" */
    --st-acting:  var(--inst-blue);     /* reserved: computer-use "acting" — ships dark */
    --st-up-fg:    color-mix(in srgb, var(--st-up) 60%, var(--text));
    --st-amber-fg: color-mix(in srgb, var(--st-amber) 62%, var(--text));
    --st-red-fg:   color-mix(in srgb, var(--st-red) 58%, var(--text));
    --st-up-ring:    color-mix(in srgb, var(--st-up) 16%, transparent);
    --st-amber-ring: color-mix(in srgb, var(--st-amber) 16%, transparent);
    --st-red-ring:   color-mix(in srgb, var(--st-red) 20%, transparent);
    --st-idle-ring:  color-mix(in srgb, var(--st-idle) 15%, transparent);
    --st-up-line:    color-mix(in srgb, var(--st-up) 32%, transparent);
    --st-amber-line: color-mix(in srgb, var(--st-amber) 34%, transparent);
    --st-red-line:   color-mix(in srgb, var(--st-red) 35%, transparent);
    --blue-line:     color-mix(in srgb, var(--inst-blue) 30%, transparent);
    --blue-wash:     color-mix(in srgb, var(--inst-blue) 12%, transparent);
    --amber-wash:    color-mix(in srgb, var(--st-amber) 9%, transparent);

    /* ── Type scale (rem → honors user font-size / Plasma HiDPI) ── */
    --fs-display: 1.1875rem;  /* 19 */
    --fs-lg: 0.9rem;          /* ~14 (row name) */
    --fs-md: 0.8125rem;       /* 13 (pill) */
    --fs-sm: 0.78125rem;      /* 12.5 (state / link) */
    --fs-xs: 0.75rem;         /* 12 (desc) */
    --fs-2xs: 0.71875rem;     /* 11.5 (labels) */
    --fs-3xs: 0.65625rem;     /* 10.5 (badge) */
    --fw-regular: 400; --fw-medium: 560; --fw-semibold: 640;

    /* ── Space scale (4px base) ── */
    --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 20px;
    --sp-6: 24px; --sp-7: 32px; --sp-8: 40px; --sp-10: 64px;

    /* ── Radius / elevation / glass ── */
    --radius-sm: 9px; --radius-md: 16px; --radius-pill: 999px;
    --blur-raised: 14px; --blur-overlay: 18px; --glass-saturate: 1.2;
    --shadow: 0 12px 40px -16px rgba(0,0,0,0.7);
    font-synthesis: none;
    -webkit-font-smoothing: antialiased;
  }
  /* Graphics-yield / low-VRAM fallback: backdrop-blur is GPU work; when transparency is
     reduced (or a compositor budget event trips this), drop the blur and lean on solid glass. */
  @media (prefers-reduced-transparency: reduce) {
    :root { --glass: rgba(24,28,40,0.94); }
    .card, .pill { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 700px at 78% -8%, color-mix(in srgb, var(--inst-blue) 10%, transparent), transparent 60%),
      radial-gradient(1000px 600px at 8% 108%, color-mix(in srgb, var(--brand-warm) 9%, transparent), transparent 55%),
      linear-gradient(160deg, var(--bg-0), var(--bg-1) 45%, var(--bg-2));
    background-attachment: fixed;
    min-height: 100%;
    letter-spacing: 0.1px;
  }
  .wrap { max-width: 940px; margin: 0 auto; padding: var(--sp-8) var(--sp-6) var(--sp-10); }

  /* ── living aurora backdrop ──────────────────────────────────────────
     A WebGL port of nimbus aurora's Flow look (spikes/ambient-backdrop), muted to
     the instrument register. A single, steady, NON-reactive drift — deliberately not
     wired to agent mood, so it never lurches when the fleet gets busy (the keyhole tray
     is where live state is shown). Sits BEHIND the glass cards; the body gradient above
     stays as the no-WebGL fallback. */
  #auroraBg { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0;
    display: block; pointer-events: none; }
  .wrap { position: relative; z-index: 1; }   /* content rides above the backdrop */

  /* The horizon strip — the keyhole instrument's signature gesture (HorizonStrip.qml): a 2px
     line that breathes slowly at rest so the panel reads as *alive and watching*, not frozen.
     3.2s breath, deliberately desynced from the 4s poll. Freezes (holds) when attention>0 —
     calm, never alarm; never uses the reserved warm hue. Reduced-motion → static. */
  .horizon { height: 2px; border-radius: 2px; margin-bottom: var(--sp-6);
    background: linear-gradient(90deg,
      color-mix(in srgb, var(--inst-horizon) 50%, #000), var(--inst-blue) 50%,
      color-mix(in srgb, var(--inst-horizon) 65%, #000));
    opacity: .85; animation: hbreath 3.2s ease-in-out infinite; }
  @keyframes hbreath { 0%,100% { opacity: .85; } 50% { opacity: .42; } }
  body.has-attention .horizon { animation: none; opacity: .7;
    background: linear-gradient(90deg, color-mix(in srgb, var(--inst-horizon) 50%, #000),
      color-mix(in srgb, var(--st-amber) 55%, var(--inst-horizon)) 50%,
      color-mix(in srgb, var(--inst-horizon) 65%, #000)); }
  @media (prefers-reduced-motion: reduce) { .horizon { animation: none; } }

  /* ── header ─────────────────────────────────────────── */
  header { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--sp-5); flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: var(--sp-3); }
  .mark {
    width: 34px; height: 34px; border-radius: 10px; flex: none;
    background: linear-gradient(150deg, var(--blue), var(--brand-warm));
    box-shadow: 0 0 0 1px rgba(255,255,255,0.10) inset, 0 6px 18px -8px var(--blue);
    position: relative;
  }
  .mark::after {
    content: ""; position: absolute; inset: 9px; border-radius: 4px;
    background: var(--bg-0); opacity: 0.55;
  }
  .brand h1 { font-size: var(--fs-display); font-weight: var(--fw-semibold); margin: 0; line-height: 1.1; }
  .brand .sub { font-size: var(--fs-sm); color: var(--muted); margin-top: 2px; }

  .health { display: flex; flex-direction: column; align-items: flex-end; gap: var(--sp-2); }
  .pill {
    display: inline-flex; align-items: center; gap: var(--sp-2);
    padding: var(--sp-2) var(--sp-4); border-radius: var(--radius-pill);
    font-size: var(--fs-md); font-weight: var(--fw-semibold);
    border: 1px solid var(--card-line); background: var(--card);
    backdrop-filter: blur(var(--blur-raised)); -webkit-backdrop-filter: blur(var(--blur-raised));
    transition: color .4s ease, border-color .4s ease, background .4s ease;
  }
  .pill .bead { width: 9px; height: 9px; border-radius: 50%; background: var(--st-up); box-shadow: 0 0 10px var(--st-up); }
  .pill.nominal { color: var(--st-up-fg); border-color: var(--st-up-line); }
  .pill.nominal .bead { background: var(--st-up); box-shadow: 0 0 10px var(--st-up); }
  .pill.attention { color: var(--st-amber-fg); border-color: var(--st-amber-line); }
  .pill.attention .bead { background: var(--st-amber); box-shadow: 0 0 10px var(--st-amber); }
  .pill.degraded { color: #c2c7d2; border-color: var(--card-line-hi); }
  .pill.degraded .bead { background: var(--st-unknown); box-shadow: none; }
  /* When the data is stale or the server is unreachable, signal "blind" by dimming the SIGNAL
     (dots, row accents, glass, badges) — NEVER the text. The old `opacity:.5` on all of <main>
     dropped body text to 4.3:1 (WCAG AA fail; measured in ADR-0031's spike); the launch view
     fixed it the same way. The name/desc/state stay at full contrast — that's the readable truth
     the user most needs when the panel has gone blind. */
  body.stale .dot { filter: grayscale(.6) saturate(.5); opacity: .6; box-shadow: none !important; }
  body.stale .row.attention, body.stale .row.warn { box-shadow: none; }
  body.stale .card { background: color-mix(in srgb, var(--card-bg, var(--card-line)) 60%, transparent); }
  body.stale .badge { opacity: .6; }
  body.stale .open, body.stale .why-btn, body.stale .fix { opacity: .75; transition: opacity .3s; }
  .updated { font-size: var(--fs-2xs); color: var(--faint); display: flex; align-items: center; gap: var(--sp-2); }
  .updated .live { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); opacity: .9; }
  body.refreshing .updated .live { animation: ping .9s ease-out; }
  @keyframes ping { 0% { transform: scale(1); opacity: .9; } 100% { transform: scale(2.6); opacity: 0; } }

  /* ── groups ─────────────────────────────────────────── */
  .group { margin-top: var(--sp-7); }
  .group > h2 {
    font-size: var(--fs-2xs); font-weight: var(--fw-semibold); text-transform: uppercase;
    letter-spacing: 1.4px; color: var(--faint); margin: 0 0 var(--sp-3) var(--sp-1);
  }
  .card {
    border: 1px solid var(--card-line); border-radius: var(--radius-md);
    background: var(--card);
    backdrop-filter: blur(var(--blur-overlay)) saturate(var(--glass-saturate));
    -webkit-backdrop-filter: blur(var(--blur-overlay)) saturate(var(--glass-saturate));
    box-shadow: var(--shadow); overflow: hidden;
  }
  .row { border-top: 1px solid var(--card-line); transition: box-shadow .6s ease; }
  .row:first-child { border-top: none; }
  .rowline { display: flex; align-items: center; gap: var(--sp-4); padding: var(--sp-4) var(--sp-5);
             transition: background .3s ease; }
  .rowline:hover { background: var(--tint-hover); }
  .row.attention { box-shadow: inset 3px 0 0 var(--st-red); }
  .row.warn { box-shadow: inset 3px 0 0 var(--st-amber); }
  /* The recovery breath: when a service crosses from attention back to healthy, the row's
     edge eases warm→green and exhales once. Delight made entirely of true state. */
  .row.recovered { animation: recover 1.8s ease-out 1; }
  @keyframes recover {
    0%   { box-shadow: inset 3px 0 0 var(--st-red); background: color-mix(in srgb, var(--st-red) 9%, transparent); }
    40%  { box-shadow: inset 3px 0 0 var(--st-up);  background: color-mix(in srgb, var(--st-up) 12%, transparent); }
    100% { box-shadow: inset 3px 0 0 transparent;   background: transparent; }
  }

  /* Inline "Why?" — a read-only journalctl tail, expanded under a failed row. */
  .why { margin: 0; padding: 0 var(--sp-5) var(--sp-4) calc(var(--sp-5) + 25px);
         font-family: ui-monospace, "JetBrains Mono", Menlo, monospace; font-size: var(--fs-3xs);
         color: var(--muted); white-space: pre-wrap; word-break: break-word; line-height: 1.55;
         max-height: 200px; overflow: auto; border-top: 1px dashed var(--card-line); padding-top: var(--sp-3); }
  .why[hidden] { display: none; }
  button.why-btn {
    font: inherit; font-size: var(--fs-sm); font-weight: var(--fw-medium); color: var(--blue); cursor: pointer;
    padding: 5px var(--sp-3); border-radius: var(--radius-sm); white-space: nowrap;
    background: transparent; border: 1px solid var(--blue-line); transition: background .2s, border-color .2s;
  }
  button.why-btn:hover { background: var(--blue-wash); }
  button.why-btn:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

  /* ── Dot grammar (3 axes): FILL = a process is/was present (solid) vs none (hollow);
     GLOW = reserved for attention (failed / live-but-unreachable), never decoration;
     STROKE colour/style separates the hollow trio (ok=green, absent=idle, unknown=dashed). ── */
  .dot { width: 11px; height: 11px; border-radius: 50%; flex: none; background: var(--st-idle);
         box-shadow: 0 0 0 4px var(--st-idle-ring); transition: background .4s, box-shadow .4s; }
  .dot.up      { background: var(--st-up);    box-shadow: 0 0 0 4px var(--st-up-ring); }
  .dot.ok      { background: transparent;     box-shadow: inset 0 0 0 2px var(--st-up); opacity: .82; }
  .dot.idle    { background: transparent;     box-shadow: inset 0 0 0 2px var(--st-idle); opacity: .85; } /* on-demand backend: dormant by design, hollow ⇒ not the solid grey of a daemon that's down */
  .dot.starting{ background: var(--st-amber); box-shadow: 0 0 0 4px var(--st-amber-ring); animation: breathe 1.6s ease-in-out infinite; }
  .dot.stopping{ background: var(--st-amber); box-shadow: 0 0 0 4px var(--st-amber-ring); animation: breathe 1.6s ease-in-out infinite; }
  .dot.failed  { background: var(--st-red);   box-shadow: 0 0 0 4px var(--st-red-ring), 0 0 7px color-mix(in srgb, var(--st-red) 38%, transparent); }
  .dot.down    { background: var(--st-idle);  box-shadow: 0 0 0 4px var(--st-idle-ring); }
  .dot.absent  { background: transparent;     box-shadow: inset 0 0 0 2px var(--st-idle); opacity: .7; }
  .dot.unknown { background: transparent;     border: 1.5px dashed var(--st-unknown); }
  @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: .42; } }
  @media (prefers-reduced-motion: reduce) {
    .dot, .row.recovered { animation: none !important; }
    body.refreshing .updated .live { animation: none; }
  }

  .meta { min-width: 0; flex: 1; }
  .meta .name { font-size: var(--fs-lg); font-weight: var(--fw-medium); line-height: 1.25; min-width: 0; }
  .meta .desc { font-size: var(--fs-xs); color: var(--muted); margin-top: 2px;
                overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .right { display: flex; align-items: center; gap: var(--sp-3); flex: none; }
  .state { font-size: var(--fs-sm); color: var(--muted); font-variant-numeric: tabular-nums;
           text-align: right; min-width: 64px; }
  .row.attention .state { color: var(--st-red-fg); }
  .badge { font-size: var(--fs-3xs); font-weight: var(--fw-semibold); padding: 3px var(--sp-2);
           border-radius: var(--radius-pill); border: 1px solid var(--card-line-hi); color: var(--muted); white-space: nowrap; }
  .badge.reach { color: var(--st-up-fg); border-color: var(--st-up-line); }
  .badge.unreach { color: var(--st-red-fg); border-color: var(--st-red-line); }
  /* "desktop only" / "fix on desktop" — an INFORMATIONAL (not-a-door) cue on a remote origin.
     A dashed cool border distinguishes it by treatment (not just text/position) from the solid
     neutral "system" scope badge. */
  .badge.offsite { color: var(--blue); border-style: dashed; border-color: var(--blue-line, var(--card-line-hi)); }
  a.open {
    color: var(--blue); text-decoration: none; font-size: var(--fs-sm); font-weight: var(--fw-medium);
    padding: 5px var(--sp-3); border-radius: var(--radius-sm); border: 1px solid var(--blue-line);
    transition: background .2s, border-color .2s; white-space: nowrap;
  }
  a.open:hover { background: var(--blue-wash); border-color: color-mix(in srgb, var(--inst-blue) 50%, transparent); }
  a.open:focus-visible, button.fix:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
  button.fix {
    font: inherit; font-size: var(--fs-xs); font-weight: var(--fw-medium); color: var(--st-amber-fg); cursor: pointer;
    padding: 5px var(--sp-3); border-radius: var(--radius-sm); white-space: nowrap;
    background: var(--amber-wash); border: 1px solid var(--st-amber-line);
    transition: background .2s, border-color .2s;
  }
  button.fix:hover { background: color-mix(in srgb, var(--st-amber) 16%, transparent); border-color: color-mix(in srgb, var(--st-amber) 55%, transparent); }

  /* ── Dispatch (ADR-0039): on an attention row, send an agent to investigate + fix + log. Its
     own line under the rowline (like "Why?"), so the row never crowds. Idle → a Claude/Hermes
     chooser; once a worker runs → a live state. The proposed-fix command + the durable log are
     local-only (the server already redacts them remotely; we also gate the affordance here). */
  .dispatch-bar { display: flex; align-items: center; flex-wrap: wrap; gap: var(--sp-2);
    padding: 0 var(--sp-5) var(--sp-4) calc(var(--sp-5) + 25px); font-size: var(--fs-xs); }
  .dispatch-bar:empty { display: none; }
  .dispatch-bar .lbl { color: var(--faint); font-size: var(--fs-2xs); letter-spacing: .3px; }
  button.disp { font: inherit; font-size: var(--fs-xs); font-weight: var(--fw-medium); color: var(--blue);
    cursor: pointer; padding: 4px var(--sp-3); min-height: 24px; display: inline-flex; align-items: center;
    border-radius: var(--radius-sm); white-space: nowrap; background: var(--blue-wash);  /* idle fill ⇒ ≥3:1 boundary */
    border: 1px solid var(--blue-line); transition: background .2s, border-color .2s; }
  button.disp:hover { background: var(--blue-wash); }
  button.disp:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
  button.disp small { color: var(--faint); font-weight: var(--fw-regular); margin-left: 5px; font-size: .85em; }
  button.disp.disp-copy { color: var(--st-amber-fg); border-color: var(--st-amber-line); background: var(--amber-wash); }
  .disp-state { display: inline-flex; align-items: center; gap: var(--sp-2); color: var(--muted); }
  .disp-state.busy, .disp-state.warn { color: var(--st-amber-fg); }
  .disp-state.good { color: var(--st-up-fg); }
  .disp-state.bad  { color: var(--st-red-fg); }
  .spin { width: 11px; height: 11px; border-radius: 50%; flex: none;
    border: 2px solid var(--st-amber-line); border-top-color: var(--st-amber);
    display: inline-block; animation: spin .9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .disp-diag { color: var(--muted); font-size: var(--fs-2xs); width: 100%; margin-top: 2px; line-height: 1.5; }
  a.disp-log { color: var(--blue); font-size: var(--fs-2xs); text-decoration: none; }
  a.disp-log:hover { text-decoration: underline; }
  .disp-note { width: 100%; color: var(--faint); font-size: var(--fs-2xs); margin-top: 1px; line-height: 1.4; }
  .disp-conf { font-size: var(--fs-3xs); font-weight: var(--fw-semibold); padding: 2px var(--sp-2);
    border-radius: var(--radius-pill); border: 1px solid var(--card-line-hi); color: var(--muted); white-space: nowrap; }
  .disp-conf.high { color: var(--st-up-fg); border-color: var(--st-up-line); }
  .disp-conf.low  { color: var(--st-amber-fg); border-color: var(--st-amber-line); }
  @media (prefers-reduced-motion: reduce) { .spin { animation: none; } }

  footer { margin-top: var(--sp-7); text-align: center; color: var(--faint); font-size: var(--fs-2xs); line-height: 1.7; }
  footer code { color: var(--muted); background: rgba(255,255,255,0.05); padding: 1.5px 6px; border-radius: 5px; }

  @media (max-width: 560px) {
    .wrap { padding: var(--sp-7) var(--sp-4) var(--sp-8); }
    .meta .desc { white-space: normal; }
    .state { min-width: 0; }
    .right { gap: var(--sp-2); }
  }
</style>
</head>
<body>
  <canvas id="auroraBg" aria-hidden="true"></canvas>
  <div class="wrap">
    <div class="horizon" aria-hidden="true"></div>
    <header>
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>AgentOS</h1>
          <div class="sub">system status · the boot stack at a glance</div>
        </div>
      </div>
      <div class="health">
        <!-- Honest first-paint: start neutral (degraded), not green, until a real tick resolves. -->
        <span id="pill" class="pill degraded" role="status" aria-live="polite">
          <span class="bead"></span><span id="pill-text">checking…</span>
        </span>
        <span class="updated"><span class="live"></span><span id="updated">connecting…</span></span>
        <button id="bring-up" class="fix" hidden>Copy: bring stack up ↻</button>
      </div>
    </header>

    <!-- No aria-live here: it re-renders on a timer, and announcing the whole list every
         few seconds would be hostile to screen readers. The summary pill (aria-live) carries
         the at-a-glance state; per-row changes are visual. -->
    <main id="groups"></main>

    <footer>
      Live view of <code>systemctl</code> + port reachability · refreshes every few seconds<br />
      AgentOS substrate over Hermes · <span id="origin">served locally on <code>127.0.0.1</code></span>
    </footer>
  </div>

<script>
  const STATE_RANK = { failed: 0, starting: 1, stopping: 1, down: 2, unknown: 3, up: 4, idle: 5, ok: 5, absent: 6 };
  let lastSig = "";       // only re-render when the service set actually changes (avoids focus/aria churn)
  let prevAttn = new Set(); // ids that needed attention last tick — to detect the recovery moment
  let dispatchBySvc = {};  // svc id → its latest dispatch incident (ADR-0039), refreshed each tick

  // The dispatch bar under an attention row: a chooser when idle, a live state once a worker runs.
  function dispBarHTML(inc) {
    if (!inc)
      return `<span class="lbl">investigate &amp; fix:</span>` +
        `<button class="disp" data-target="claude" aria-label="Dispatch a Claude agent (cloud) to investigate and fix this service">Claude<small>cloud</small></button>` +
        `<button class="disp" data-target="hermes" aria-label="Dispatch a Hermes agent (local) to investigate and fix this service">Hermes<small>local</small></button>` +
        `<span class="disp-note">tries a safe restart first, then proposes a fix for you to approve</span>`;
    const who = inc.target === "hermes" ? "Hermes" : "Claude";
    const log = origin.can_copy_fix
      ? ` <a class="disp-log" href="/dispatch/log?id=${esc(inc.id)}" target="_blank" rel="noopener">log ↗</a>` : "";
    const conf = inc.confidence ? ` <span class="disp-conf ${esc(inc.confidence)}">${esc(inc.confidence)} confidence</span>` : "";
    const diag = inc.diagnosis ? `<span class="disp-diag">${esc(inc.diagnosis)}</span>` : "";
    switch (inc.status) {
      case "queued":
        return `<span class="disp-state busy"><span class="spin" aria-hidden="true"></span> queued…</span>`;
      case "triaging":
        return `<span class="disp-state busy"><span class="spin" aria-hidden="true"></span> ${inc.auto_eligible ? "trying recovery…" : "triaging…"}</span>`;
      case "first-aid":
        return `<span class="disp-state busy"><span class="spin" aria-hidden="true"></span> trying recovery…</span>`;
      case "investigating":
        return `<span class="disp-state busy"><span class="spin" aria-hidden="true"></span> ${esc(who)} investigating… <small>(up to ~3 min)</small></span>`;
      case "recovered":
        return `<span class="disp-state good">✓ ${esc(inc.outcome || "recovered")}</span>`;
      case "needs-approval": {
        const fix = (origin.can_copy_fix && inc.proposal)
          ? `<button class="disp disp-copy" data-cmd="${esc(inc.proposal)}">copy fix</button>`
          : `<span class="badge offsite" aria-label="The proposed fix is available on the desktop">fix on desktop</span>`;
        return `<span class="disp-state warn">the agent proposed a fix — review &amp; run it yourself</span> ${fix}${conf}${log}${diag}`;
      }
      case "diagnosed":
        return `<span class="disp-state">investigated — no safe auto-fix${conf}</span>${log}${diag}`;
      case "handed-off":
        return `<span class="disp-state">handed to Hermes${conf}</span>${log}${diag}`;
      case "blocked":
        return `<span class="disp-state warn">${esc(inc.outcome || "unavailable")}</span>${log}`;
      default:  // failed
        return `<span class="disp-state bad">couldn't fix — ${esc(inc.outcome || "see log")}</span>${log}${diag}`;
    }
  }

  function paintDispatches() {
    for (const bar of document.querySelectorAll(".dispatch-bar")) {
      const html = dispBarHTML(dispatchBySvc[bar.dataset.svc]);
      if (bar.dataset.h !== html) { bar.innerHTML = html; bar.dataset.h = html; }
    }
  }

  async function refreshDispatch() {
    try {
      const d = await (await fetch("/dispatch.json", { cache: "no-store" })).json();
      const map = {};
      for (const i of d.incidents || []) if (!map[i.svc]) map[i.svc] = i;  // incidents arrive newest-first
      dispatchBySvc = map;
      paintDispatches();
    } catch (_) { /* the dispatch view is best-effort; the status panel still works without it */ }
  }

  async function postDispatch(svc, target) {
    // Fetch the anti-CSRF token live (never stale across a panel restart), then POST. A cross-origin
    // page can't read the token, so it can't forge this. Server bounds it to an in-attention catalog svc.
    const { token } = await (await fetch("/dispatch/token", { cache: "no-store" })).json();
    return (await fetch("/dispatch", { method: "POST", cache: "no-store",
      headers: { "Content-Type": "application/json", "X-Dispatch-Token": token },
      body: JSON.stringify({ id: svc, target }) })).json();
  }

  // Escape every value that reaches innerHTML — names/descs/states come from systemd + the
  // catalog and must not be able to inject markup into the login-time panel.
  const ESC = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" };
  const esc = (v) => String(v == null ? "" : v).replace(/[&<>"']/g, (c) => ESC[c]);
  const safeUrl = (u) => (/^https?:\/\//i.test(u || "") ? u : "");
  const isAttention = (s) =>
    s.status === "failed" ||
    (s.status === "down" && (s.kind || "daemon") === "daemon") ||
    ((s.status === "up" || s.status === "starting") && s.reach === "unreachable");

  // The origin is decided by the SERVER (ADR-0031 gap #4), never by reading location.host (a
  // reverse proxy rewrites that). Default to local so a payload without the field stays usable;
  // the daemon is loopback-bound, and a real remote origin always arrives stamped remote.
  let origin = { remote: false, can_copy_fix: true, host: null };
  const hostBase = (h) => (h && /^[A-Za-z0-9.\-]+(:\d{1,5})?$/.test(h) ? h.replace(/:[0-9]+$/, "") : "");
  // A door the panel can actually follow on THIS origin — never a dead loopback link on the phone.
  // Local: the loopback url as-is. Remote: rewrite to the tailnet host, or "" for an un-served
  // (tailnet:false) / un-rewritable door (which renders a quiet "desktop only" instead).
  function doorHref(s) {
    const u = safeUrl(s.url); if (!u) return "";
    if (!origin.remote) return u;
    if (s.tailnet === false) return "";
    const base = hostBase(origin.host); if (!base) return "";
    let port = ""; try { port = new URL(u).port; } catch (_) { return ""; }
    const suffix = (!port || port === "443") ? "" : ":" + port;
    return "https://" + base + suffix + "/";
  }

  function relTime(ts) {
    // ts is systemd's ActiveEnterTimestamp string; Date.parse handles most locales.
    const t = Date.parse(ts);
    if (isNaN(t)) return "";
    const s = Math.max(0, (Date.now() - t) / 1000);
    if (s < 60) return "just now";
    if (s < 3600) return Math.floor(s / 60) + "m";
    if (s < 86400) return Math.floor(s / 3600) + "h";
    return Math.floor(s / 86400) + "d";
  }

  function row(s, recovered) {
    const attention = isAttention(s);
    const warn = !attention && (s.status === "starting" || s.status === "stopping" || s.status === "down");
    let cls = "row" + (attention ? " attention" : warn ? " warn" : "");
    if (recovered && recovered.has(s.id)) cls += " recovered";  // the recovery breath
    // Show uptime only for a genuinely-running daemon; respect the server's nuanced label
    // ("ready", "ran ✓", "failed (…)") for everything else rather than flattening to "up · …".
    const since = s.status === "up" && s.since ? relTime(s.since) : "";
    const running = s.state === "running" || s.state === "listening";
    const stateText = s.status === "up" && running && since ? `up · ${since}` : (s.state || s.status);

    let badge = "";
    if (s.reach === "reachable")        badge = `<span class="badge reach">reachable</span>`;
    else if (s.reach === "unreachable") badge = `<span class="badge unreach">no response</span>`;

    // Origin-aware door (ADR-0031): an Open link only when it actually resolves on this origin;
    // a url-bearing service that isn't tailnet-reachable reads "desktop only", never a dead link.
    const href = doorHref(s);
    const open = href
      ? `<a class="open" href="${esc(href)}" target="_blank" rel="noopener" aria-label="Open ${esc(s.name)} (opens in a new tab)">Open ↗</a>`
      : (s.url && origin.remote ? `<span class="badge offsite" aria-label="${esc(s.name)} is reachable on the desktop only">desktop only</span>` : "");

    // On an attention row: "Why?" tails the journal inline (read-only, fine remotely). "Copy fix"
    // copies a systemctl one-liner — offered ONLY when the SERVER says the origin is provably
    // local (gap #4): a shell affordance must never reach the phone. The human disposes. When it's
    // suppressed remotely, an in-row cue explains the absence in place (not only in the footer).
    const why = attention
      ? `<button class="why-btn" data-id="${esc(s.id)}" aria-expanded="false">Why?</button>` : "";
    const fix = attention && s.unit
      ? (origin.can_copy_fix
          ? `<button class="fix" data-unit="${esc(s.unit)}" data-scope="${esc(s.scope)}">Copy fix</button>`
          : `<span class="badge offsite" aria-label="Recovery for ${esc(s.name)} is available on the desktop">fix on desktop</span>`)
      : "";

    const aria = `${s.name}: ${stateText}` + (s.reach ? `, ${s.reach === "reachable" ? "reachable" : "no response"}` : "");
    return `<div class="${cls}" role="listitem" aria-label="${esc(aria)}">
      <div class="rowline">
        <span class="dot ${esc(s.status)}" aria-hidden="true"></span>
        <div class="meta">
          <div class="name">${esc(s.name)}${s.scope === "system" ? ' <span class="badge">system</span>' : ""}</div>
          <div class="desc">${esc(s.desc)}</div>
        </div>
        <div class="right">
          <span class="state">${esc(stateText)}</span>
          ${badge}${why}${fix}${open}
        </div>
      </div>
      <pre class="why" hidden></pre>
      ${attention ? `<div class="dispatch-bar" data-svc="${esc(s.id)}" role="status" aria-live="polite" aria-atomic="true"></div>` : ""}
    </div>`;
  }

  function setPill(mode, text) {
    document.getElementById("pill").className = "pill " + mode;
    document.getElementById("pill-text").textContent = text;
  }

  function render(data, recovered) {
    const groupsEl = document.getElementById("groups");
    const byGroup = {};
    for (const s of data.services) (byGroup[s.group] ||= []).push(s);

    const order = data.groups && data.groups.length ? data.groups : Object.keys(byGroup);
    let html = "";
    for (const g of order) {
      const list = (byGroup[g] || []).slice().sort((a, b) => STATE_RANK[a.status] - STATE_RANK[b.status]);
      if (!list.length) continue;
      html += `<section class="group"><h2 id="g-${esc(g).replace(/\W+/g, "-")}">${esc(g)}</h2>` +
              `<div class="card" role="list" aria-labelledby="g-${esc(g).replace(/\W+/g, "-")}">${list.map((s) => row(s, recovered)).join("")}</div></section>`;
    }
    groupsEl.innerHTML = html || `<section class="group"><div class="card"><div class="row"><div class="rowline"><div class="meta"><div class="desc">No services in the catalog.</div></div></div></div></div></section>`;
    paintDispatches();   // fill the just-rendered attention rows' dispatch bars from current state
  }

  function paintHeader(data, stale) {
    const att = (data && data.summary && data.summary.attention) || 0;
    const total = (data && data.summary && data.summary.total) || 0;
    document.body.classList.toggle("has-attention", att > 0 && !stale);
    // The "bring stack up" one-liner is a shell affordance — local origin only (gap #4).
    document.getElementById("bring-up").hidden = !(att > 0 && origin.can_copy_fix);
    if (stale)            setPill("degraded", "data is stale");
    else if (data && data.error) setPill("degraded", "status error");
    else if (att > 0)     setPill("attention", `${att} need${att === 1 ? "s" : ""} attention`);
    else                  setPill("nominal", `all ${total} systems nominal`);  // count-up conveys scope
    document.title = (att > 0 ? `(${att}) ` : "") + "AgentOS · system status";
  }

  async function tick() {
    try {
      const r = await fetch("/status.json", { cache: "no-store" });
      const data = await r.json();
      pollDelay = POLL_MIN;                       // reached the box: reset any backoff
      if (data.origin) origin = data.origin;     // server-decided trust (gap #4); set before render
      setOriginNote();
      // Detect the recovery moment: ids that needed attention last tick and are now healthy.
      const services = data.services || [];
      const curAttn = new Set(services.filter(isAttention).map((s) => s.id));
      const healthy = new Set(services.filter((s) => s.status === "up" || s.status === "ok").map((s) => s.id));
      const recovered = new Set([...prevAttn].filter((id) => healthy.has(id)));
      prevAttn = curAttn;
      // Re-render rows only when something meaningful changed (state/reach), so a focused
      // "Open" link isn't yanked away, screen readers aren't disturbed, and an unchanged
      // system stays visually still (the refresh pulse fires only on a real change).
      const sig = services.map((s) => `${s.id}:${s.status}:${s.reach}`).join("|") +
                  "|" + (data.error || "") + "|" + services.length;
      if (sig !== lastSig) {
        document.body.classList.add("refreshing");
        setTimeout(() => document.body.classList.remove("refreshing"), 950);
        render(data, recovered);
        lastSig = sig;
      }
      // Trust the server's own freshness stamp: if the payload is old, the panel has gone
      // blind — show that honestly rather than a confidently-current clock.
      const age = data.generated_at ? Math.max(0, Date.now() / 1000 - data.generated_at) : 0;
      const stale = age > 12;
      document.body.classList.toggle("stale", stale);
      paintHeader(data, stale);
      document.getElementById("updated").textContent = stale
        ? `stale — last updated ${Math.round(age)}s ago`
        : "updated " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      refreshDispatch();   // pick up live dispatch state (ADR-0039); best-effort, never blocks the panel
    } catch (e) {
      // The status server itself is unreachable — never keep showing a calm green pill.
      pollDelay = Math.min(POLL_MAX, Math.round(pollDelay * 1.8));   // back off; don't hammer
      document.body.classList.add("stale");
      setPill("degraded", "status unavailable");
      document.getElementById("updated").textContent = "status server unreachable — retrying…";
    }
  }

  async function flash(btn, text, ok) {
    const orig = btn.dataset.label || btn.textContent;
    btn.dataset.label = orig;
    btn.textContent = text;
    setTimeout(() => { btn.textContent = orig; }, 1900);
    return ok;
  }

  // Delegated row actions. All read-only: "Why?" tails the journal; "Copy fix" copies the
  // systemctl one-liner. The server never mutates state; the human runs what they choose.
  document.getElementById("groups").addEventListener("click", async (e) => {
    // Dispatch (ADR-0039): the chooser POSTs; "copy fix" copies a model-proposed one-liner.
    const dispBtn = e.target.closest("button.disp");
    if (dispBtn) {
      if (dispBtn.classList.contains("disp-copy")) {
        try { await navigator.clipboard.writeText(dispBtn.dataset.cmd); flash(dispBtn, "copied — run it"); }
        catch { flash(dispBtn, "copy failed"); }
        return;
      }
      const bar = dispBtn.closest(".dispatch-bar");
      const target = dispBtn.dataset.target;
      // Consent (privacy): the cloud (Claude) target sends this service's redacted logs + details
      // off your device to Anthropic. Ask once per session; Hermes stays local. Honest, not a nag.
      if (target === "claude" && !sessionStorage.getItem("agentos-cloud-ok")) {
        if (!confirm("Claude runs in Anthropic's cloud. This service's recent logs and details " +
          "(secrets redacted) will be sent off your device to diagnose it. Hermes keeps everything " +
          "local. Send to the cloud?")) return;
        sessionStorage.setItem("agentos-cloud-ok", "1");
      }
      bar.innerHTML = `<span class="disp-state busy" tabindex="-1"><span class="spin" aria-hidden="true"></span> dispatching…</span>`;
      bar.dataset.h = "";
      bar.querySelector(".disp-state")?.focus();   // keep focus + the live region coherent after the swap
      let res = null;
      try { res = await postDispatch(bar.dataset.svc, target); } catch (_) {}
      if (res && res.error) {                      // refused (429/409) or worker-launch failure — surface it
        bar.innerHTML = `<span class="disp-state warn">${esc(res.error)}</span>`;
        bar.dataset.h = "";                         // the next poll repaints to the chooser
      } else {
        refreshDispatch();                          // show the real (queued/recovering) state now
      }
      return;
    }
    const fixBtn = e.target.closest("button.fix");
    if (fixBtn) {
      const unit = fixBtn.dataset.unit;
      const sc = fixBtn.dataset.scope === "system" ? "sudo systemctl" : "systemctl --user";
      const cmd = `${sc} reset-failed ${unit} && ${sc} restart ${unit}`;
      try { await navigator.clipboard.writeText(cmd); flash(fixBtn, "copied — run it anywhere"); }
      catch { flash(fixBtn, "copy failed"); }
      return;
    }
    const whyBtn = e.target.closest("button.why-btn");
    if (whyBtn) {
      const pre = whyBtn.closest(".row").querySelector(".why");
      const opening = pre.hasAttribute("hidden");
      whyBtn.setAttribute("aria-expanded", String(opening));
      if (!opening) { pre.setAttribute("hidden", ""); return; }
      if (!pre.dataset.loaded) {
        pre.textContent = "reading the journal…";
        try {
          const r = await fetch("/why?id=" + encodeURIComponent(whyBtn.dataset.id), { cache: "no-store" });
          const d = await r.json();
          pre.textContent = d.error ? `(${d.error})` : d.lines;
          pre.dataset.loaded = "1";
        } catch { pre.textContent = "(could not read the journal)"; }
      }
      pre.removeAttribute("hidden");
      return;
    }
  });

  // The inverse of "Copy fix": when services are down, copy the one-liner that brings the
  // whole stack back up. Still copy-don't-execute — the panel proposes, you dispose.
  document.getElementById("bring-up").addEventListener("click", async (e) => {
    const cmd = "~/Documents/AgentOS/integrations/apply-all.sh";
    try { await navigator.clipboard.writeText(cmd); flash(e.currentTarget, "copied — run it"); }
    catch { flash(e.currentTarget, "copy failed"); }
  });

  // Honest origin line, from the server's verdict (not location.host, which a proxy rewrites).
  // Guarded so an unchanging origin isn't rewritten every 4s tick (no churn; origin is static
  // per session in practice). The aria-live pill carries the at-a-glance state.
  let lastOriginNote = "";
  function setOriginNote() {
    const el = document.getElementById("origin");
    if (!el) return;
    const html = origin.remote
      ? `over your tailnet (<code>${esc(hostBase(origin.host) || "your tailnet")}</code>) · recovery is desktop-only`
      : `served locally on <code>127.0.0.1</code>`;
    if (html !== lastOriginNote) { el.innerHTML = html; lastOriginNote = html; }
  }
  // Self-scheduling poll with backoff+jitter: 4s steady, but on failure (a flaky tailnet path,
  // a sleeping box) back off exponentially to ~60s instead of hammering at a fixed rate, and add
  // jitter so multiple phones don't synchronize. Resets to 4s on the next success / on refocus.
  const POLL_MIN = 4000, POLL_MAX = 60000;
  let pollDelay = POLL_MIN, pollTimer = null;
  function reschedule() {
    clearTimeout(pollTimer);
    pollTimer = setTimeout(runTick, Math.round(pollDelay * (0.85 + Math.random() * 0.3)));
  }
  async function runTick() { await tick(); reschedule(); }
  setOriginNote();
  runTick();
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) { pollDelay = POLL_MIN; runTick(); }   // refocus: fresh read, reset backoff
  });
</script>

<!-- Living aurora backdrop — WebGL Flow (spikes/ambient-backdrop): one steady, non-reactive
     drift (no agent-mood input, so it never lurches). GPU-considerate: pauses when the tab is
     hidden; static single frame under reduced-motion / software GL. -->
<script>
(function () {
  const cv = document.getElementById("auroraBg");
  if (!cv) return;
  const gl = cv.getContext("webgl", { antialias:false, alpha:false })
          || cv.getContext("experimental-webgl", { alpha:false });
  if (!gl) return;  // no WebGL → the body gradient remains as the backdrop

  const FRAG = `
precision highp float;
uniform vec2 iResolution; uniform float iTime;
float hash(vec2 p){ p=fract(p*vec2(123.34,345.45)); p+=dot(p,p+34.345); return fract(p.x*p.y); }
float vnoise(vec2 p){ vec2 i=floor(p),f=fract(p); vec2 u=f*f*(3.0-2.0*f);
  float a=hash(i),b=hash(i+vec2(1.0,0.0)),c=hash(i+vec2(0.0,1.0)),d=hash(i+vec2(1.0,1.0));
  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y); }
float fbm(vec2 p){ float v=0.0,a=0.55; mat2 r=mat2(0.80,0.60,-0.60,0.80);
  for(int i=0;i<5;i++){ v+=a*vnoise(p); p=r*p*2.02+11.3; a*=0.5; } return v; }
float fbm3(vec2 p){ float v=0.0,a=0.6; mat2 r=mat2(0.80,0.60,-0.60,0.80);
  for(int i=0;i<3;i++){ v+=a*vnoise(p); p=r*p*2.02+11.3; a*=0.5; } return v; }
vec3 ramp(float t,vec3 c0,vec3 c1,vec3 c2,vec3 c3,vec3 c4){ t=clamp(t,0.0,1.0)*4.0;
  if(t<1.0) return mix(c0,c1,t); if(t<2.0) return mix(c1,c2,t-1.0);
  if(t<3.0) return mix(c2,c3,t-2.0); return mix(c3,c4,t-3.0); }
float flowField(vec2 base,float t){
  vec2 q=vec2(fbm3(base+vec2(0.0,0.12*t)),fbm3(base+vec2(5.2,1.7-0.10*t)));
  vec2 r=vec2(fbm3(base+1.8*q+vec2(1.7,9.2+0.08*t)),fbm3(base+1.8*q+vec2(8.3,2.8-0.07*t)));
  return fbm(base+2.2*r); }
void main(){
  vec2 res=iResolution; vec2 uv=gl_FragCoord.xy/res;
  vec2 p=(gl_FragCoord.xy-0.5*res)/res.y;
  vec3 c0=vec3(0.026,0.034,0.052), c1=vec3(0.042,0.064,0.105), c2=vec3(0.064,0.104,0.168),
       c3=vec3(0.092,0.156,0.232), c4=vec3(0.150,0.245,0.330);
  float t=iTime*0.36;                  /* one fixed drift rate (the old resting speed) — no mood term, so the timeline never rescales/lurches */
  vec2 base=p*2.8+vec2(0.12*t,-0.06*t);
  float f=flowField(base,t);
  float field=smoothstep(0.28,0.82,f);
  vec3 col=ramp(field,c0,c1,c2,c3,c4);
  col*=mix(0.90,1.0,smoothstep(0.0,0.9,uv.y));   /* gentle fixed vertical falloff (cosmetic) */
  gl_FragColor=vec4(col,1.0);
}`;
  const VERT = "attribute vec2 a; void main(){ gl_Position=vec4(a,0.0,1.0); }";
  function sh(t,s){ const o=gl.createShader(t); gl.shaderSource(o,s); gl.compileShader(o); return o; }
  const prog=gl.createProgram();
  gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT));
  gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS)) return;
  gl.useProgram(prog);
  const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
  const loc=gl.getAttribLocation(prog,"a"); gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  const U=n=>gl.getUniformLocation(prog,n);
  const uRes=U("iResolution"),uTime=U("iTime");

  // Treat an unaccelerated WebGL context (SwiftShader / llvmpipe / software) like reduced-motion:
  // a full-screen flow field on a CPU rasteriser stutters badly — far calmer to hold one frame
  // than to lurch. (Check the real cause once via about:gpu / chrome://gpu if it's still static.)
  function softwareGL(){
    try {
      const e = gl.getExtension("WEBGL_debug_renderer_info");
      const r = e ? String(gl.getParameter(e.UNMASKED_RENDERER_WEBGL)) : "";
      return /swiftshader|llvmpipe|software|basic render|softpipe/i.test(r);
    } catch (_) { return false; }
  }
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches || softwareGL();

  // Render the backdrop at CSS-pixel resolution (DPR 1): it's a soft, low-frequency navy haze
  // sitting behind blurred glass cards — supersampling it is wasted fill-rate AND a larger
  // backdrop-filter blur source to recompute every frame. The DOM/text stays crisp regardless.
  function resize(){ const dpr=1;
    cv.width=Math.floor(innerWidth*dpr); cv.height=Math.floor(innerHeight*dpr);
    gl.viewport(0,0,cv.width,cv.height); }
  addEventListener("resize", resize); resize();

  // Advance an internal clock from a *clamped* per-frame delta rather than absolute wall time.
  // The browser coalesces rAF while the pointer is idle, then bursts on the next mouse move;
  // an absolute clock would jump the flow field forward by the whole gap in one frame, which
  // reads as the backdrop lurching the instant you touch the mouse. Capping the step (~3 frames)
  // makes a stall resume as a smooth crawl — never a leap. lastNow resets on stop() (tab hide).
  let simTime = 0, lastNow = 0;
  function frame(now){
    if (lastNow) simTime += Math.min((now - lastNow) / 1000, 0.05);
    lastNow = now;
    gl.uniform2f(uRes,cv.width,cv.height);
    gl.uniform1f(uTime, reduce ? 8.0 : simTime);
    gl.drawArrays(gl.TRIANGLES,0,3);
  }
  if (reduce) {                        // static: a few rAF frames so it composites, then stop
    let n=0; const once=now=>{ frame(now); if(++n<3) requestAnimationFrame(once); };
    requestAnimationFrame(once);
  } else {
    let raf=0;
    const loop=now=>{ frame(now); raf=requestAnimationFrame(loop); };
    const start=()=>{ if(!raf) raf=requestAnimationFrame(loop); };
    const stop =()=>{ if(raf){ cancelAnimationFrame(raf); raf=0; lastNow=0; } };
    document.addEventListener("visibilitychange",()=> document.hidden ? stop() : start());
    start();
  }
})();
</script>
</body>
</html>
