# AgentOS installable components — the single source of truth for what install.sh / uninstall.sh
# (and the apply-all.sh / uninstall-all.sh wrappers) can bring up or tear down. Edit this to add,
# remove, or re-default a capability; the drivers need no changes.
#
# Fields (pipe-separated, surrounding spaces ignored):
#   id        | tier | default | root   | apply cmd                 | restore cmd                | description
#
#   tier:    core | service | desktop | privileged | remote | hermes   (grouping only)
#   default: on | off        — what --defaults / the interactive checklist preselects
#   root:    no    → the driver RUNS it (user-scope)
#            sudo  → the driver PRINTS `sudo <cmd>` (never auto-escalates)
#            manual→ the driver PRINTS `<cmd>` for you to run (e.g. a network-exposure action)
#   cmds are paths relative to this integrations/ dir; args are allowed (e.g. "agentosd-remote.sh up").
#
# id                | tier       | default | root   | apply                                        | restore                                       | description
core-substrate      | core       | on      | no     | ../crates/agentosd/dist/apply.sh             | ../crates/agentosd/dist/restore.sh            | agentosd binary + lease/feed/keyhole/telemetry/coexist units
hermes-dashboard    | service    | on      | no     | hermes/dashboard/apply.sh                    | hermes/dashboard/restore.sh                   | Hermes board + kanban (:9119)
