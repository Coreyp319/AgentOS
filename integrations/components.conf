# AgentOS installable components — the single source of truth for what install.sh / uninstall.sh
# (and the apply-all.sh / uninstall-all.sh wrappers) can bring up or tear down. Edit this to add,
# remove, or re-default a capability; the drivers need no changes.
#
# Fields (pipe-separated, surrounding spaces ignored):
#   id        | tier | default | root   | apply cmd                 | restore cmd                | description
#
#   tier:    core | service | desktop | privileged | remote | hermes   (grouping only)
#   default: on | off        — what --defaults / the interactive checklist preselects
#   root:    no    → the driver RUNS it (user-scope)
#            sudo  → the driver PRINTS `sudo <cmd>` (never auto-escalates)
#            manual→ the driver PRINTS `<cmd>` for you to run (e.g. a network-exposure action)
#   cmds are paths relative to this integrations/ dir; args are allowed (e.g. "agentosd-remote.sh up").
#
# id                | tier       | default | root   | apply                                        | restore                                       | description
core-substrate      | core       | on      | no     | ../crates/agentosd/dist/apply.sh             | ../crates/agentosd/dist/restore.sh            | The always-on AgentOS service: manages the GPU, gathers telemetry, and feeds the wallpaper and tray.
hermes-dashboard    | service    | on      | no     | hermes/dashboard/apply.sh                    | hermes/dashboard/restore.sh                   | The Hermes agent board and task kanban, in your browser (:9119).
comfyui             | service    | on      | no     | comfyui/apply.sh                             | comfyui/restore.sh                            | The image and video engine. Installed but kept off — AgentOS starts it on demand so it never hogs the GPU.
lucid               | service    | on      | no     | lucid/apply.sh                               | lucid/restore.sh                              | Lucid, the dreaming app where you make and branch videos (:8765).
status-panel        | service    | on      | no     | status-panel/apply.sh                        | status-panel/restore.sh                       | Your status page — opens at login to show what is healthy and to turn features on or off (:9123).
models-panel        | service    | on      | no     | models/apply.sh                              | models/restore.sh                             | A panel for reviewing the AI models installed on your machine (:9124).
share-hub           | service    | on      | no     | share/apply.sh                               | share/restore.sh                              | Send a photo from your phone to your machine to turn into a video (:8770).
lucid-drain         | service    | on      | no     | lucid-drain/apply.sh                         | lucid-drain/restore.sh                        | Runs queued Create-Video requests in the background, one at a time.
keyhole             | desktop    | on      | no     | keyhole/apply.sh                             | keyhole/restore.sh                            | A small tray icon showing live GPU and agent activity at a glance. Read-only.
window-drag-wind    | desktop    | on      | no     | window-drag-wind/apply.sh                    | window-drag-wind/restore.sh                   | Drag a window and a gust of wind ripples across the reactive wallpaper.
reactive-wallpaper  | desktop    | off     | no     | reactive-wallpaper/apply.sh                  | reactive-wallpaper/restore.sh                 | A calm animated wallpaper that shifts with what your agents are doing. No Unreal needed, fully reversible.
portal-timeout      | desktop    | on      | no     | portal-timeout/apply.sh                      | portal-timeout/restore.sh                     | Gives the desktop's portal more time to start at boot so screen-sharing and notifications stay reliable. Recommended on CachyOS.
aurora-theme        | desktop    | off     | no     | aurora-theme/apply.sh                        | aurora-theme/restore.sh                       | The Aurora look: a violet light and dark color scheme across your apps. Uses the Plasma 6.7 Union style preview.
aurora-panel        | desktop    | off     | no     | aurora-panel/apply.sh                        | aurora-panel/restore.sh                       | Extends the Aurora violet accent into the panel, tray, and widgets.
aurora-notifications| desktop    | off     | no     | aurora-notifications/apply.sh                | aurora-notifications/restore.sh               | Gives native Plasma notification popups the Aurora navy-and-violet look.
dolphin-create      | desktop    | on      | no     | create-video/apply.sh                        | create-video/restore.sh                       | Adds a right-click Create Video from Image action in the Dolphin file manager.
browser-host        | desktop    | on      | no     | browser-create-video/apply.sh                | browser-create-video/restore.sh               | Adds a right-click Create Video from Image menu in Firefox and Chrome.
krunner-finder      | desktop    | off     | no     | krunner-finder/apply.sh                      | krunner-finder/restore.sh                     | Ask Claude, ask local Hermes, or web-search right from KRunner (Alt+Space). Wraps the Nimbus pack runner; no sudo.
firefox-pin         | privileged | on      | sudo   | browser-create-video/policy/apply-policy.sh  | browser-create-video/policy/restore-policy.sh | Pins the signed Create-Video extension so the right-click menu survives a Firefox restart. Needs sudo.
hermes-plugins      | hermes     | off     | no     | hermes/apply.sh                              | hermes/restore.sh                             | Lets Hermes raise a gentle needs-you nudge on the desktop when an agent is waiting on you.
gpu-coordinator     | hermes     | off     | no     | hermes/gpu-coordinator/apply.sh              | hermes/gpu-coordinator/restore.sh             | Wires Hermes into the GPU lease so a live chat automatically pauses the dream, then resumes it — chat and dreaming share one GPU.
tailscale-remote    | remote     | off     | manual | agentosd-remote.sh up                        | agentosd-remote.sh down                       | Reach the AgentOS web apps from your phone over your private Tailscale network. Manual step — read the security note.
# NOT driver-managed (intentionally manual): the Unreal lane needs a UE engine path + a sudo route, so
# run integrations/unreal/launch.sh by hand (UE_ROOT=…) and reverse with integrations/unreal/restore.sh.
