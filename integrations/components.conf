# AgentOS installable components — the single source of truth for what install.sh / uninstall.sh
# (and the apply-all.sh / uninstall-all.sh wrappers) can bring up or tear down. Edit this to add,
# remove, or re-default a capability; the drivers need no changes.
#
# Fields (pipe-separated, surrounding spaces ignored):
#   id        | tier | default | root   | apply cmd                 | restore cmd                | description
#
#   tier:    core | service | desktop | privileged | remote | hermes   (grouping only)
#   default: on | off        — what --defaults / the interactive checklist preselects
#   root:    no    → the driver RUNS it (user-scope)
#            sudo  → the driver PRINTS `sudo <cmd>` (never auto-escalates)
#            manual→ the driver PRINTS `<cmd>` for you to run (e.g. a network-exposure action)
#   cmds are paths relative to this integrations/ dir; args are allowed (e.g. "agentosd-remote.sh up").
#
# id                | tier       | default | root   | apply                                        | restore                                       | description
core-substrate      | core       | on      | no     | ../crates/agentosd/dist/apply.sh             | ../crates/agentosd/dist/restore.sh            | agentosd binary + lease/feed/keyhole/telemetry/coexist units
hermes-dashboard    | service    | on      | no     | hermes/dashboard/apply.sh                    | hermes/dashboard/restore.sh                   | Hermes board + kanban (:9119)
comfyui             | service    | on      | no     | comfyui/apply.sh                             | comfyui/restore.sh                            | ComfyUI unit, installed DISABLED (coordinator owns ComfyUI under lease, ADR-0015; manual-start only)
lucid               | service    | on      | no     | lucid/apply.sh                               | lucid/restore.sh                              | Lucid dream-loop web UI (:8765)
status-panel        | service    | on      | no     | status-panel/apply.sh                        | status-panel/restore.sh                       | boot-health front door, opens at login (:9123)
models-panel        | service    | on      | no     | models/apply.sh                              | models/restore.sh                             | model audit panel (:9124)
share-hub           | service    | on      | no     | share/apply.sh                               | share/restore.sh                              | phone->box photo ingest hub (:8770)
lucid-drain         | service    | on      | no     | lucid-drain/apply.sh                         | lucid-drain/restore.sh                        | ADR-0019 deferred create-video queue drainer
keyhole             | desktop    | on      | no     | keyhole/apply.sh                             | keyhole/restore.sh                            | ADR-0012 read-only resource/lease tray plasmoid (consumes keyhole.json)
window-drag-wind    | desktop    | on      | no     | window-drag-wind/apply.sh                    | window-drag-wind/restore.sh                   | KWin script: window-MOVE → wind gust on the reactive wallpaper (ADR-0023)
dolphin-create      | desktop    | on      | no     | create-video/apply.sh                        | create-video/restore.sh                       | right-click "Create Video" in Dolphin
browser-host        | desktop    | on      | no     | browser-create-video/apply.sh                | browser-create-video/restore.sh               | browser native host (Firefox/Chromium/Chrome)
firefox-pin         | privileged | on      | sudo   | browser-create-video/policy/apply-policy.sh  | browser-create-video/policy/restore-policy.sh | force-install signed XPI so the right-click menu survives a Firefox restart (root)
hermes-plugins      | hermes     | off     | no     | hermes/apply.sh                              | hermes/restore.sh                             | needs-you-signal plugin (restarts the gateway)
tailscale-remote    | remote     | off     | manual | agentosd-remote.sh up                        | agentosd-remote.sh down                       | expose the UIs to your tailnet (tailscale serve)
# NOT driver-managed (intentionally manual): the Unreal lane needs a UE engine path + a sudo route, so
# run integrations/unreal/launch.sh by hand (UE_ROOT=…) and reverse with integrations/unreal/restore.sh.
